<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bucket List Viaggi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-800 flex flex-col">

  <header class="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm">
    <nav class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
      <div class="flex items-center gap-3">
        <span class="inline-flex items-center justify-center w-9 h-9 rounded-full bg-blue-500 text-white text-base select-none"><i class="fa-solid fa-plane-departure"></i></span>
        <div>
          <span class="font-bold text-base text-slate-900 tracking-tight">Bucket List Viaggi</span>
          <p id="auth-status" class="text-xs text-slate-500 leading-none mt-0.5">Non autenticato</p>
        </div>
      </div>
      <button
        id="logout-btn"
        type="button"
        class="hidden px-3 py-1.5 rounded-lg bg-slate-800 text-white text-sm font-medium hover:bg-slate-700 transition-colors"
      >
        Esci
      </button>
    </nav>
  </header>

  <main class="flex-1 max-w-5xl mx-auto w-full px-4 py-6 space-y-4">

    <!-- ===== LIST VIEW ===== -->
    <div id="list-view" class="space-y-4">

      <!-- Hero (solo quando non loggato) -->
      <div id="unauth-hero" class="hidden rounded-xl overflow-hidden shadow-sm relative">
        <img src="assets/hero.jpg" alt="Esplora il mondo" class="w-full h-44 object-cover sm:h-56">
        <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex items-end p-5">
          <div>
            <p class="text-white font-bold text-xl drop-shadow">Pianifica i tuoi prossimi viaggi</p>
            <p class="text-white/80 text-sm mt-0.5">Accedi per aggiungere e gestire le tue destinazioni</p>
          </div>
        </div>
      </div>

      <!-- Login -->
      <section id="login-section" class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
        <h2 class="text-base font-semibold mb-3 text-slate-900">Accedi</h2>
        <form id="login-form" class="flex flex-col sm:flex-row gap-3 items-stretch sm:items-end">
          <div class="flex-1 flex flex-col gap-1">
            <label for="login-username" class="text-xs font-medium text-slate-600">Username</label>
            <input
              id="login-username" type="text" name="username" required
              class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white"
            >
          </div>
          <div class="flex-1 flex flex-col gap-1">
            <label for="login-password" class="text-xs font-medium text-slate-600">Password</label>
            <input
              id="login-password" type="password" name="password" required
              class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white"
            >
          </div>
          <button type="submit"
            class="px-5 py-2 rounded-lg bg-blue-500 text-white text-sm font-semibold hover:bg-blue-600 transition-colors shrink-0">
            Accedi
          </button>
        </form>
      </section>

      <!-- Cerca + Filtri -->
      <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 sm:p-5 space-y-3">
        <div class="flex gap-2">
          <input
            type="text" id="search-input" placeholder="Cerca per nome o paese..."
            class="flex-1 rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white"
          >
          <button id="search-btn" type="button"
            class="px-4 py-2 rounded-lg bg-slate-800 text-white text-sm font-medium hover:bg-slate-700 transition-colors shrink-0">
            Cerca
          </button>
        </div>
        <!-- Filtri pill -->
        <div id="filter-bar" class="hidden flex flex-wrap gap-2">
          <button data-filter="all"
            class="filter-pill active px-3 py-1 rounded-full text-xs font-medium border transition-colors bg-blue-500 text-white border-blue-500">
            Tutte
          </button>
          <button data-filter="mine" id="filter-mine"
            class="filter-pill hidden px-3 py-1 rounded-full text-xs font-medium border transition-colors bg-white text-slate-700 border-slate-300 hover:bg-slate-50">
            Le mie
          </button>
          <button data-filter="visited"
            class="filter-pill px-3 py-1 rounded-full text-xs font-medium border transition-colors bg-white text-slate-700 border-slate-300 hover:bg-slate-50">
            Visitate
          </button>
          <button data-filter="unvisited"
            class="filter-pill px-3 py-1 rounded-full text-xs font-medium border transition-colors bg-white text-slate-700 border-slate-300 hover:bg-slate-50">
            Da visitare
          </button>
        </div>
      </section>

      <!-- Lista destinazioni -->
      <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 sm:p-5">
        <h2 class="text-base font-semibold text-slate-900 mb-3">Destinazioni</h2>
        <div id="destination-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3"></div>
        <div id="pagination-controls" class="mt-4 flex items-center justify-between gap-3">
          <button id="prev-btn" type="button"
            class="px-3 py-1.5 rounded-lg border border-slate-300 text-sm text-slate-700 bg-white disabled:opacity-40 disabled:cursor-not-allowed hover:bg-slate-50 transition-colors">
            ← Prec
          </button>
          <span id="page-info" class="text-sm text-slate-500">Nessun risultato</span>
          <button id="next-btn" type="button"
            class="px-3 py-1.5 rounded-lg border border-slate-300 text-sm text-slate-700 bg-white disabled:opacity-40 disabled:cursor-not-allowed hover:bg-slate-50 transition-colors">
            Succ →
          </button>
        </div>
      </section>

      <!-- Form nuova destinazione (solo se loggato) -->
      <section id="form-section" class="hidden bg-white rounded-xl shadow-sm border border-slate-200 p-4 sm:p-5">
        <h2 class="text-base font-semibold text-slate-900 mb-4">Aggiungi destinazione</h2>
        <form id="destination-form" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div class="flex flex-col gap-1">
            <label for="nome" class="text-xs font-medium text-slate-600">Nome</label>
            <input id="nome" name="nome" type="text" required minlength="2" maxlength="100"
              class="touched-target w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white">
          </div>
          <div class="flex flex-col gap-1">
            <label for="paese" class="text-xs font-medium text-slate-600">Paese</label>
            <input id="paese" name="paese" type="text" required minlength="2" maxlength="60"
              class="touched-target w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white">
          </div>
          <div class="flex flex-col gap-1">
            <label for="costo_stimato" class="text-xs font-medium text-slate-600">Costo stimato (€)</label>
            <input id="costo_stimato" name="costo_stimato" type="number" required min="0" max="50000" step="0.01"
              class="touched-target w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white">
          </div>
          <div class="flex flex-col gap-1">
            <label for="durata_giorni" class="text-xs font-medium text-slate-600">Durata (giorni)</label>
            <input id="durata_giorni" name="durata_giorni" type="number" required min="1" max="365" step="1"
              class="touched-target w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white">
          </div>
          <div class="flex items-center gap-2 mt-1">
            <input id="visitato" name="visitato" type="checkbox"
              class="h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
            <label for="visitato" class="text-sm text-slate-700">Già visitata</label>
          </div>
          <div class="flex justify-end sm:col-span-2 mt-1">
            <button type="submit"
              class="px-5 py-2 rounded-lg bg-blue-500 text-white text-sm font-semibold hover:bg-blue-600 transition-colors">
              Aggiungi
            </button>
          </div>
        </form>
      </section>

    </div>
    <!-- END LIST VIEW -->

    <!-- ===== DETAIL VIEW (hidden inizialmente) ===== -->
    <div id="detail-view" class="hidden space-y-4">
      <div id="detail-content" class="space-y-4">
        <!-- Popolato dinamicamente da JS -->
      </div>
    </div>

    <!-- Feedback visivo -->
    <div id="feedback" role="alert" aria-live="polite" class="text-sm"></div>

  </main>

  <footer class="mt-auto py-4 text-center text-xs text-slate-400 border-t border-slate-200">
    Progetto universitario "Bucket List Viaggi" — 2024
  </footer>

</body>
</html>
